<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADI - Recuperar Contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link rel="apple-touch-icon" href="assets/img/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
        .container-wrapper { display: flex; background-color: #ffffff; border-radius: 1rem; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); overflow: hidden; width: 100%; max-width: 900px; min-height: 500px; }
        .left-panel { flex: 1; background-image: url('https://placehold.co/450x500/4169E1/FFFFFF?text=Recuperar+Acceso'); background-size: cover; background-position: center; }
        .right-panel { flex: 1; padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .button-primary { background-color: #FF7F00; color: #ffffff; padding: 0.75rem 1.5rem; border-radius: 0.75rem; font-weight: 600; transition: background-color 0.3s ease; }
        .button-primary:hover { background-color: #E67300; }
        .text-link { color: #4169E1; }
        .text-link:hover { text-decoration: underline; }
        .input-field { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem; line-height: 1.5rem; color: #1f2937; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .input-field:focus { outline: none; border-color: #4169E1; box-shadow: 0 0 0 3px rgba(65, 105, 225, 0.2); }
        @media (max-width: 768px) { .container-wrapper { flex-direction: column; min-height: auto; } .left-panel { display: none; } .right-panel { padding: 1.5rem; } }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <div class="left-panel"></div>
        <div class="right-panel">
            <img src="LOGO ADI-GGM.png" alt="ADI - Grupo Granjas Marinas Logo" class="mb-6 w-40 h-auto">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Recuperar Contraseña</h1>
            <p class="text-gray-600 mb-6">Ingresa tu correo y número de identidad para recibir las instrucciones.</p>

            <div id="status-message" class="mb-4 text-center"></div>

            <form id="forgot-password-form" action="send_reset_link.php" method="POST" class="space-y-4 w-full max-w-xs">
                <div>
                    <input type="email" id="email" name="email" placeholder="Correo Electrónico" class="input-field" required>
                </div>
                <div>
                    <input type="text" id="identity_number" name="identity_number" placeholder="Número de Identidad" class="input-field" required>
                </div>
                <button type="submit" class="button-primary w-full">Enviar enlace de recuperación</button>
            </form>

            <a href="login.html" class="text-link text-sm mt-4 block">Volver a Iniciar Sesión</a>
        </div>
    </div>
    <script>
        // Muestra mensajes de éxito o error que vienen de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status');
        const message = urlParams.get('message');
        const statusDiv = document.getElementById('status-message');
        if (status === 'success') {
            statusDiv.innerHTML = `<p class="text-green-600">${message}</p>`;
        } else if (status === 'error') {
            statusDiv.innerHTML = `<p class="text-red-500">${message}</p>`;
        }
    </script>
</body>
</html>
