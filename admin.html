<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - SAC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="p-6" style="display: none;">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-gray-800 p-6 flex justify-between items-center text-white">
            <h1 class="text-2xl font-bold">🛠️ Panel de Administración</h1>
            <a href="dashboard.html" class="text-gray-300 hover:text-white text-sm">← Volver al Portal</a>
        </div>

        <div class="flex border-b">
            <button onclick="switchTab('news')" id="tab-news" class="flex-1 py-4 text-center font-bold text-blue-600 border-b-2 border-blue-600 bg-blue-50 focus:outline-none transition">
                📢 Noticias
            </button>
            <button onclick="switchTab('notif')" id="tab-notif" class="flex-1 py-4 text-center font-bold text-gray-500 hover:bg-gray-50 focus:outline-none transition">
                🔔 Notificaciones
            </button>
            <button onclick="switchTab('faq')" id="tab-faq" class="flex-1 py-4 text-center font-bold text-gray-500 hover:bg-gray-50 focus:outline-none transition">
                ❓ FAQs
            </button>
        </div>

        <div class="p-6">
            <div id="view-news">
                <h2 class="text-xl font-bold mb-4" id="news-form-title">Crear Noticia</h2>
                <form id="form-news" class="space-y-4">
                    <input type="hidden" id="news-id" value=""> 
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Título</label>
                        <input type="text" id="news-title" required class="w-full mt-1 p-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="Ej: Nueva Feria de Préstamos">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Contenido</label>
                        <textarea id="news-content" rows="4" required class="w-full mt-1 p-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="Detalles de la noticia..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">URL de Imagen (Opcional)</label>
                        <input type="url" id="news-img" class="w-full mt-1 p-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="https://ejemplo.com/imagen.jpg">
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" id="news-important" class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                        <label class="ml-2 block text-sm text-gray-900">Marcar como Importante (Aparece primero)</label>
                    </div>
                    
                    <div class="flex gap-4 pt-2">
                        <button type="submit" id="btn-save-news" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow transition">Publicar Noticia</button>
                        <button type="button" id="btn-cancel-edit" class="hidden w-1/3 bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-lg shadow transition">Cancelar</button>
                    </div>
                </form>

                <div class="mt-10">
                    <h2 class="text-xl font-bold mb-4 border-t pt-6 text-gray-800">Noticias Publicadas</h2>
                    <div id="admin-news-list" class="space-y-3">
                        <p class="text-gray-500 text-sm">Cargando noticias...</p>
                    </div>
                </div>
            </div>

            <div id="view-notif" class="hidden">
                <h2 class="text-xl font-bold mb-4">Enviar Notificación Directa</h2>
                <form id="form-notif" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Destinatario</label>
                        <select id="notif-user" required class="w-full mt-1 p-2 border rounded-lg focus:ring-green-500 focus:border-green-500">
                            <option value="all">📢 ENVIAR A TODOS (Global)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Mensaje</label>
                        <textarea id="notif-msg" rows="3" required class="w-full mt-1 p-2 border rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="Su préstamo ha sido aprobado..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Tipo (Color)</label>
                        <select id="notif-type" class="w-full mt-1 p-2 border rounded-lg focus:ring-green-500 focus:border-green-500">
                            <option value="info">Información (Azul)</option>
                            <option value="success">Éxito (Verde)</option>
                            <option value="warning">Alerta (Amarillo)</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow transition">Enviar Notificación</button>
                </form>
            </div>

            <div id="view-faq" class="hidden">
                <h2 class="text-xl font-bold mb-4" id="faq-form-title">Añadir Pregunta Frecuente</h2>
                <form id="form-faq" class="space-y-4">
                    <input type="hidden" id="faq-id" value=""> <div>
                        <label class="block text-sm font-medium text-gray-700">Pregunta</label>
                        <input type="text" id="faq-question" required class="w-full mt-1 p-2 border rounded-lg focus:ring-purple-500 focus:border-purple-500" placeholder="¿Cómo solicito un préstamo?">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Respuesta</label>
                        <textarea id="faq-answer" rows="4" required class="w-full mt-1 p-2 border rounded-lg focus:ring-purple-500 focus:border-purple-500" placeholder="Pasos a seguir..."></textarea>
                    </div>
                    
                    <div class="flex gap-4 pt-2">
                        <button type="submit" id="btn-save-faq" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg shadow transition">Guardar Pregunta</button>
                        <button type="button" id="btn-cancel-faq-edit" class="hidden w-1/3 bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-lg shadow transition">Cancelar</button>
                    </div>
                </form>

                <div class="mt-10">
                    <h2 class="text-xl font-bold mb-4 border-t pt-6 text-gray-800">Preguntas Frecuentes Activas</h2>
                    <div id="admin-faq-list" class="space-y-3">
                        <p class="text-gray-500 text-sm">Cargando FAQs...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        function switchTab(tab) {
            ['news', 'notif', 'faq'].forEach(t => {
                document.getElementById('view-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).className = "flex-1 py-4 text-center font-bold text-gray-500 hover:bg-gray-50 focus:outline-none transition";
            });
            document.getElementById('view-' + tab).classList.remove('hidden');
            
            const colors = { 'news': 'blue', 'notif': 'green', 'faq': 'purple' };
            const color = colors[tab];
            
            document.getElementById('tab-' + tab).className = `flex-1 py-4 text-center font-bold text-${color}-600 border-b-2 border-${color}-600 bg-${color}-50 focus:outline-none transition`;
        }
    </script>
</body>
</html>
