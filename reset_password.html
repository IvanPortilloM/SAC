<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADI - Restablecer Contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link rel="apple-touch-icon" href="assets/img/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
        .container-wrapper { display: flex; background-color: #ffffff; border-radius: 1rem; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); overflow: hidden; width: 100%; max-width: 900px; min-height: 500px; }
        .left-panel { flex: 1; background-image: url('https://placehold.co/450x500/228B22/FFFFFF?text=Define+tu+nueva+clave'); background-size: cover; background-position: center; }
        .right-panel { flex: 1; padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .button-primary { background-color: #FF7F00; color: #ffffff; padding: 0.75rem 1.5rem; border-radius: 0.75rem; font-weight: 600; transition: background-color 0.3s ease; }
        .button-primary:hover { background-color: #E67300; }
        .input-field { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem; line-height: 1.5rem; color: #1f2937; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .input-field:focus { outline: none; border-color: #4169E1; box-shadow: 0 0 0 3px rgba(65, 105, 225, 0.2); }
        @media (max-width: 768px) { .container-wrapper { flex-direction: column; min-height: auto; } .left-panel { display: none; } .right-panel { padding: 1.5rem; } }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <div class="left-panel"></div>
        <div class="right-panel">
            <img src="LOGO ADI-GGM.png" alt="ADI - Grupo Granjas Marinas Logo" class="mb-6 w-40 h-auto">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Establecer Nueva Contraseña</h1>

            <form id="reset-form" action="process_reset_password.php" method="POST" class="space-y-4 w-full max-w-xs">
                <input type="hidden" id="token" name="token">

                <div>
                    <input type="password" id="new_password" name="new_password" placeholder="Nueva Contraseña" class="input-field" required>
                </div>
                <div>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirmar Contraseña" class="input-field" required>
                </div>
                <button type="submit" class="button-primary w-full">Cambiar Contraseña</button>
            </form>
            <div id="error-message" class="mt-4 text-red-500"></div>
        </div>
    </div>

    <script>
        // Capturar el token de la URL y ponerlo en el campo oculto
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('token').value = token;
        } else {
            // Si no hay token, no se puede continuar
            document.getElementById('reset-form').innerHTML = '<p class="text-red-500">Enlace inválido o expirado. Por favor, solicita uno nuevo.</p>';
        }

        // Validación de contraseñas
        document.getElementById('reset-form').addEventListener('submit', function(event) {
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('error-message');
            
            if (newPassword !== confirmPassword) {
                event.preventDefault(); // Detener el envío del formulario
                errorDiv.textContent = 'Las contraseñas no coinciden.';
            } else {
                errorDiv.textContent = '';
            }
        });
    </script>
</body>
</html>
